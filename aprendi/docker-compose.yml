services:
  aprendi:
    image: ghcr.io/breadandwine/aprendi:latest
    # Built and pushed from the dev machine via `docker buildx build
    # --platform linux/amd64 ... --push`, since the NAS's UGOS Docker UI
    # only supports pulling pre-built images, not a local build context.
    # See aprendi/README.md for the full build/push process.
    container_name: aprendi
    restart: unless-stopped
    # Wake-on-LAN requires sending a UDP broadcast packet onto the physical
    # LAN. Docker's default bridge network isolates the container behind
    # NAT, so the broadcast likely never reaches the desktop's NIC. Host
    # networking gives the container direct access to the NAS's real
    # network interface, the same way this NAS's other containers (e.g.
    # Home Assistant) use network_mode: host for similar LAN-level needs.
    network_mode: host
    environment:
      - HEARTBEAT_INTERVAL_SECONDS=60
      # Desktop network details, verified during Wake-on-LAN testing
      # (see docs/decisions/0002-compute-orchestration-model.md).
      - DESKTOP_IP=192.168.1.84
      - DESKTOP_MAC=d8:5e:d3:05:33:de
      - LAN_BROADCAST_IP=192.168.1.255
    volumes:
      - /volume1/docker/aprendi/logs:/app/logs
    # Hard memory cap. The NAS (Intel N100, 8GB RAM) runs with very little
    # free memory at idle (observed ~300MB free, swap already in active
    # use) — see docs/decisions/0001-hardware-topology-and-constraints.md.
    # This limit ensures the orchestrator cannot make that worse; Docker
    # will restart the container if it's ever exceeded rather than let it
    # degrade the rest of the NAS.
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
